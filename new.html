<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sora Kim</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f3ee;
  --text: #1a1a18;
  --muted: #6b6860;
  --green: #3d7a4a;
  --mono: 'JetBrains Mono', monospace;
  --sora: 'Sora', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
}

/* 기존 code-block 유지 */
.code-block {
  background: var(--bg);
  border: 2px solid #1a1a18;
  padding: 12px 14px;
  font-size: 11px;
  line-height: 1.9;
  color: var(--muted);
}

/* 🔥 핵심: 깨짐 해결 */
.code-block pre {
  margin: 0;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.9;
  color: var(--muted);
  white-space: pre;
}

/* 기존 스타일 유지 */
.key { color: var(--green); font-weight: 700; }
.val { color: var(--text); }
.cmt { opacity: 0.5; }
</style>
</head>

<body>

<div class="code-block">
<pre><span class="cmt"># who.py</span>
<span class="key">name     </span> = <span class="val">"Sora Kim"</span>
<span class="key">focus    </span> = <span class="val">"judgment and
                accountability"</span>
<span class="key">approach </span> = <span class="val">"HCI"</span>
<span class="key">site     </span> = <span class="val">"regulated systems"</span>
<span class="key">vibe     </span> = <span class="val">"systems + humans 🐹"</span>
</pre>
</div>

</body>
</html>
